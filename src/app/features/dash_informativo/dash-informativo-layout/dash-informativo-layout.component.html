<div class="dash-informativo-layout" [class.sidebar-collapsed]="collapsed()">
  <aside class="sidebar" [class.collapsed]="collapsed()" [class.mobile-open]="mobileMenuOpen()"
    [class.mobile-closed]="isMobile() && !mobileMenuOpen()" role="complementary">
    <div class="sidebar-header">
      @if (!collapsed() || isMobile()) {
      <div class="sidebar-brand">
        <img src="/images/selector.ico" alt="Clientes" class="sidebar-logo" />
        <h2 class="sidebar-title">
          <span class="sidebar-title-main">Clientes</span>
          <span class="sidebar-title-sub">Acceso cliente</span>
        </h2>
      </div>
      }
      @if (isMobile()) {
      <button type="button" class="toggle-btn" (click)="toggleSidebar()" aria-label="Menú">
        <i [class]="mobileMenuOpen() ? 'pi pi-times' : 'pi pi-bars'"></i>
      </button>
      }
    </div>
    <nav class="sidebar-nav">
      <ul class="menu-list" [class.collapsed]="collapsed()">
        @for (item of menuItems(); track item.routerLink || item.label) {
        <li class="menu-item">
          <a [routerLink]="item.routerLink" routerLinkActive="active"
            [routerLinkActiveOptions]="{exact: true}" class="menu-link" (click)="closeMobileMenu()">
            <i [class]="item.icon" class="menu-icon"></i>
            @if (!collapsed()) {
            <span class="menu-label">{{ item.label }}</span>
            }
          </a>
        </li>
        }
      </ul>
    </nav>
  </aside>
  <div class="dash-informativo-main">
    <header class="app-header dash-informativo-header">
      <div class="header-left">
        <span class="system-name">{{ companyName() }}</span>
      </div>
      <div class="header-right">
        <span class="current-time">{{ currentTime() }}</span>
        <app-user-control></app-user-control>
      </div>
    </header>
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
  @if (showMobileOverlay()) {
  <div class="mobile-menu-overlay" (click)="closeMobileMenu()"></div>
  }
</div>
